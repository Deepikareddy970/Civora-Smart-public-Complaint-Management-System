<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Status - Smart Public Complaint Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-bridge"></i>
                <span>Smart Public Complaint Management System</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="status.html" class="active">Track Complaint</a>
                <a href="login.html">Login</a>
                <a href="register.html" class="btn-register">Register</a>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <h1><i class="fas fa-search"></i> Track Your Complaint</h1>
        <p>Enter your complaint ID to check current status and escalation level</p>
    </div>

    <div class="track-container">
        <div class="track-search">
            <input type="text" id="complaintId" placeholder="Enter Complaint ID (e.g., NS-2024-001)">
            <button onclick="trackComplaint()" class="btn-primary"><i class="fas fa-search"></i> Track</button>
        </div>

        <div id="trackResult" class="track-result hidden">
            
        </div>

        <div class="recent-complaints">
            <h3>Recent Complaints</h3>
            <div id="recentList" class="recent-list">
                
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
